[build]
  base      = "."
  command   = "pnpm install && pnpm run typecheck:libs && pnpm --filter @workspace/alphavest run build"
  publish   = "artifacts/alphavest/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV     = "production"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["bcrypt", "@simplewebauthn/server"]
  # removed "pg" from the list


[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
